<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Intel - מודיעין חזותי</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --accent-hover: #0284c7;
            --border-color: #475569;
        }

        body {
            font-family: 'Heebo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--container-bg);
            padding: 50px;
            border-radius: 16px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 550px;
            text-align: center;
        }

        h1 {
            color: var(--accent-color);
            font-size: 2.8em;
            margin-bottom: 10px;
            margin-top: 0;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1.1em;
            margin-bottom: 30px;
        }

        /* טאבים */
        .tabs {
            display: flex;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 30px;
            gap: 0;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: #64748b;
            font-size: 1em;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .tab-btn:hover {
            color: var(--accent-color);
        }

        .tab-btn.active {
            color: var(--accent-color);
            border-bottom: 3px solid var(--accent-color);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Drag & Drop */
        .file-drop-area {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 50px 20px;
            margin-bottom: 25px;
            transition: all 0.3s ease;
            background-color: rgba(255, 255, 255, 0.02);
            cursor: pointer;
        }

        .file-drop-area:hover, .file-drop-area.dragover {
            border-color: var(--accent-color);
            background-color: rgba(56, 189, 248, 0.08);
        }

        .file-msg {
            font-size: 1.2em;
            color: #cbd5e1;
            display: block;
            margin-bottom: 10px;
        }

        .file-msg-sub {
            font-size: 0.9em;
            color: #64748b;
        }

        input[type="file"] {
            display: none;
        }

        /* שדה נתיב */
        .path-input-wrapper {
            margin-bottom: 25px;
            text-align: right;
        }

        .path-input-wrapper label {
            display: block;
            color: #94a3b8;
            font-size: 0.95em;
            margin-bottom: 10px;
        }

        .path-input-wrapper input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            background-color: rgba(255,255,255,0.05);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-color);
            font-size: 1em;
            font-family: 'Courier New', monospace;
            direction: ltr;
            text-align: left;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }

        .path-input-wrapper input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: rgba(56, 189, 248, 0.05);
        }

        .path-input-wrapper input[type="text"]::placeholder {
            color: #475569;
        }

        .path-hint {
            margin-top: 8px;
            font-size: 0.82em;
            color: #475569;
            direction: rtl;
        }

        /* כפתור */
        .submit-btn {
            background-color: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            letter-spacing: 1px;
            font-family: inherit;
        }

        .submit-btn:hover {
            background-color: var(--accent-hover);
            color: white;
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Image Intel</h1>
        <p class="subtitle">מערכת סריקה וניתוח נתוני EXIF</p>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('upload')">📁 העלאת קבצים</button>
            <button class="tab-btn" onclick="switchTab('path')">🗂️ נתיב תיקייה</button>
        </div>

        <!-- טאב 1: העלאת קבצים -->
        <div id="tab-upload" class="tab-content active">
            <form action="/analyze" method="POST" enctype="multipart/form-data">
                <div class="file-drop-area" id="drop-area">
                    <span class="file-msg" id="file-msg">לחץ כאן או גרור תמונות לכאן</span>
                    <span class="file-msg-sub" id="file-msg-sub">אפשר לבחור כמה תמונות יחד</span>
                    <input type="file" name="photos" id="file-input" multiple accept="image/*">
                </div>
                <button type="submit" class="submit-btn">התחל ניתוח מודיעיני</button>
            </form>
        </div>

        <!-- טאב 2: נתיב תיקייה -->
        <div id="tab-path" class="tab-content">
            <form action="/analyze" method="POST">
                <div class="path-input-wrapper">
                    <label>הכנס נתיב מלא לתיקייה על המחשב:</label>
                    <input
                        type="text"
                        name="folder_path"
                        id="folder-path-input"
                        placeholder="C:\Users\שם\Desktop\תמונות"
                    >
                    <div class="path-hint">לדוגמה: C:\Users\user\Pictures\mission_photos</div>
                </div>
                <button type="submit" class="submit-btn">התחל ניתוח מודיעיני</button>
            </form>
        </div>
    </div>

    <script>
    // --- טאבים ---
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

        document.getElementById('tab-' + tab).classList.add('active');
        event.target.classList.add('active');
    }

    // --- Drag & Drop ---
    const dropArea = document.getElementById('drop-area');
    const fileInput = document.getElementById('file-input');
    const fileMsg = document.getElementById('file-msg');
    const fileMsgSub = document.getElementById('file-msg-sub');
    const filesMap = new Map();

    dropArea.addEventListener('click', () => fileInput.click());

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropArea.addEventListener(eventName, e => { e.preventDefault(); e.stopPropagation(); }, false);
    });

    ['dragenter', 'dragover'].forEach(eventName => {
        dropArea.addEventListener(eventName, () => dropArea.classList.add('dragover'), false);
    });
    ['dragleave', 'drop'].forEach(eventName => {
        dropArea.addEventListener(eventName, () => dropArea.classList.remove('dragover'), false);
    });

    function addFilesToList(newFiles) {
        for (let i = 0; i < newFiles.length; i++) {
            filesMap.set(newFiles[i].name, newFiles[i]);
        }
        const dt = new DataTransfer();
        filesMap.forEach(file => dt.items.add(file));
        fileInput.files = dt.files;
        updateFileName();
    }

    dropArea.addEventListener('drop', e => addFilesToList(e.dataTransfer.files));
    fileInput.addEventListener('change', e => {
        if (e.target.files.length > 0) addFilesToList(e.target.files);
    });

    function updateFileName() {
        const total = fileInput.files.length;
        if (total > 0) {
            fileMsg.textContent = "נצברו " + total + " תמונות";
            fileMsg.style.color = "var(--accent-color)";
            fileMsgSub.textContent = "אפשר להמשיך להוסיף, תמונות זהות הוחלפו אוטומטית";
        } else {
            fileMsg.textContent = "לחץ כאן או גרור תמונות לכאן";
            fileMsg.style.color = "#cbd5e1";
            fileMsgSub.textContent = "אפשר לבחור כמה תמונות יחד";
        }
    }
    </script>
</body>
</html>
